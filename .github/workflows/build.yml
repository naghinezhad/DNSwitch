name: Build DNSwitch releases

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26.3"

      - name: Build binary and zip
        run: |
          set -e
          case "${{ matrix.os }}" in
            windows)
              ext=".exe"
              GOOS=windows
              ;;
            darwin)
              ext=""
              GOOS=darwin
              ;;
            linux)
              ext=""
              GOOS=linux
              ;;
            *)
              echo "Unknown OS: ${{ matrix.os }}"
              exit 1
              ;;
          esac

          GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o DNSwitch${ext} .
          mkdir -p release
          zip -j release/DNSwitch-${{ matrix.os }}.zip DNSwitch${ext}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: DNSwitch-${{ matrix.os }}
          path: release/DNSwitch-${{ matrix.os }}.zip
